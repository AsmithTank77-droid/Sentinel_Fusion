version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Sentinel Fusion — Docker Compose
#
# Quick start:
#   docker-compose up --build
#
# API:      http://localhost:8000/api/v1/health
# Swagger:  http://localhost:8000/api/docs
# ReDoc:    http://localhost:8000/api/redoc
# ──────────────────────────────────────────────────────────────────────────────

services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: sentinel-fusion:latest

    container_name: sentinel-fusion

    ports:
      - "${SENTINEL_PORT:-8000}:8000"

    volumes:
      # Persist SQLite database across container restarts
      - sentinel_data:/app/data

    environment:
      SENTINEL_DB:             ${SENTINEL_DB:-/app/data/sentinel.db}
      SENTINEL_HOST:           ${SENTINEL_HOST:-0.0.0.0}
      SENTINEL_PORT:           ${SENTINEL_PORT:-8000}
      SENTINEL_LOG_LEVEL:      ${SENTINEL_LOG_LEVEL:-info}
      SENTINEL_ENV:            ${SENTINEL_ENV:-production}
      SENTINEL_WORKERS:        ${SENTINEL_WORKERS:-1}
      SENTINEL_RETENTION_DAYS: ${SENTINEL_RETENTION_DAYS:-90}
      SENTINEL_DEBUG:          ${SENTINEL_DEBUG:-false}

    env_file:
      - path: .env
        required: false   # .env is optional — defaults are safe

    restart: unless-stopped

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    depends_on:
      elasticsearch:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Elasticsearch — SIEM storage backend
  # Receives alerts, scores, and hunt findings from Sentinel_Fusion after
  # each pipeline run when SENTINEL_ELASTIC_ENABLED=true.
  #
  # UI:  http://localhost:9200
  # ──────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: sentinel-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elastic_data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      start_period: 40s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────────────────────
  # Kibana — SIEM dashboard and visualisation
  # View Sentinel_Fusion alerts and hunt findings in Kibana Discover.
  #
  # UI:  http://localhost:5601
  # ──────────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: sentinel-kibana

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sentinel_data:
    driver: local
  elastic_data:
    driver: local
