version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Sentinel Fusion — Docker Compose
#
# Quick start (API + dashboard only):
#   docker-compose up --build
#   → Dashboard:  http://localhost:8000/dashboard
#   → API docs:   http://localhost:8000/docs
#
# With Elasticsearch + Kibana SIEM:
#   docker-compose --profile elastic up --build
#   → Kibana:     http://localhost:5601
#   → ES:         http://localhost:9200
#
# The database is seeded automatically on first boot with:
#   • A full incident run (NRA + Windows logs, 16 alerts, Critical verdict)
#   • 7 hunt engine runs (slow-burn attacker, all 4 cross-run patterns)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Sentinel Fusion API + Dashboard ────────────────────────────────────────
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: sentinel-fusion:latest
    container_name: sentinel-fusion

    ports:
      - "${SENTINEL_PORT:-8000}:8000"

    volumes:
      # Persist SQLite database across restarts
      - sentinel_data:/app/data

    environment:
      SENTINEL_DB:              /app/data/sentinel.db
      SENTINEL_HOST:            0.0.0.0
      SENTINEL_PORT:            ${SENTINEL_PORT:-8000}
      SENTINEL_LOG_LEVEL:       ${SENTINEL_LOG_LEVEL:-info}
      SENTINEL_ENV:             ${SENTINEL_ENV:-production}
      SENTINEL_WORKERS:         ${SENTINEL_WORKERS:-1}
      SENTINEL_RETENTION_DAYS:  ${SENTINEL_RETENTION_DAYS:-90}
      SENTINEL_DEBUG:           false
      SENTINEL_FEEDS_ENABLED:   ${SENTINEL_FEEDS_ENABLED:-false}
      SENTINEL_GEO_ENABLED:     ${SENTINEL_GEO_ENABLED:-false}
      SENTINEL_ABUSEIPDB_KEY:   ${SENTINEL_ABUSEIPDB_KEY:-}
      SENTINEL_ELASTIC_ENABLED: ${SENTINEL_ELASTIC_ENABLED:-false}
      SENTINEL_ELASTIC_URL:     ${SENTINEL_ELASTIC_URL:-http://elasticsearch:9200}

    env_file:
      - path: .env
        required: false

    restart: unless-stopped

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Elasticsearch — optional SIEM backend (--profile elastic) ──────────────
  elasticsearch:
    profiles: [elastic]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: sentinel-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elastic_data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      start_period: 40s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Kibana — optional dashboard for ES (--profile elastic) ─────────────────
  kibana:
    profiles: [elastic]
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: sentinel-kibana

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

    ports:
      - "5601:5601"

    depends_on:
      elasticsearch:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sentinel_data:
    driver: local
  elastic_data:
    driver: local
